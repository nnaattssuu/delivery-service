<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="sign-in.css">
    <link rel="stylesheet" href="normalize.css">
    <title>sign-in</title>
</head>

<body>
    <div class="header">
        <div class="delivery">
            <img src="/assets/icons/box.png" alt="" />
            <p>Delivery</p>
        </div>
        <div class="header-icon">
            <div class="two-icon">
                <img src="/assets/icons/arrow.svg" alt="" />
                <img src="/assets/icons/profile.svg" alt="" />
            </div>
            <div class="sign-out">
                <button type="submit" class="btn-sign_out">Выйти</button>
                <img src="/assets/icons/sign-out.png" alt="" />
            </div>
        </div>
    </div>
    <div class="outer-wrapper">
        <div class="inner-wrapper">

            <div class=" type-delivery">
                <img src="/assets/icons/house.svg" alt="">
                <img src="/assets/icons/vector-right.svg" alt="">
                <p>Тип доставки</p>
            </div>
            <p class="font-delivery">Тип доставки</p>
            <p class=" font-progress">Шаг 1 из 7</p>
            <div class="succes">
                <div class="succes-delivery"></div>
            </div>
            <div class="express-delivery">
                <div class="express">
                    <div class="list-wrapper">
                        <div class="plane-circle">
                            <img src="/assets/icons/plane.svg" alt="">
                        </div>
                        <div>
                            <p class="font-express">Экспресс-доставка до двери</p>
                            <p .heading-delivery>780 ₽</p>
                            <p class="font-express work-day">1 рабочий день</p>
                        </div>
                    </div>
                    <img src="/assets/icons/vector-right.svg" alt="" class="vector-right">
                </div>
            </div>
            <div class="defoult-delivery">
                <div class="express">
                    <div class="list-wrapper">
                        <div class="plane-circle">
                            <img src="/assets/icons/bus-front.svg" alt="">
                        </div>
                        <div>
                            <p class="font-express">Обычная доставка</p>
                            <p>325 ₽</p>
                            <p class="font-express work-day">5 рабочих деней</p>
                        </div>
                    </div>
                    <img src="/assets/icons/vector-right.svg" alt="" class="vector-right">
                </div>
            </div>
            <div class="free-present">
                <div class="box-text">
                    <p>1+1=3</p>
                    <p class="free-three">3-я доставка в подарок</p>
                </div>
                <div class="boxs">
                    <img src="/assets/icons/box1.svg" alt="" class="box-one">
                    <img src="/assets/icons/box2.svg" alt="" class="box-two">
                    <img src="/assets/icons/box3.svg" alt="" class="box-three">
                </div>
            </div>
        </div>
    </div>
</body>

</html>
