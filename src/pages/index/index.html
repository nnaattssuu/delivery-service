<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Главная</title>
    <link rel="stylesheet" href="/src/shared/normalize.css" />
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div class="header">
        <div class="logotype">
            <img src="/assets/icons/box.png" alt="" />
            <p>Delivery</p>
        </div>
        <div class="header-actions">
            <img src="/assets/icons/arrow.svg" alt="" />
            <img src="/assets/icons/profile.svg" alt="" />
            <div class="sign-out">
                <button type="submit" class="button-sign-out">Выйти</button>
                <img src="/assets/icons/icon-sign-out.svg" alt="" />
            </div>
        </div>
    </div>
    <div class="content-grid">
        <div class="left-delivery">
            <p class="heading-text">Рассчитать доставку</p>
            <div class="left-wrapper">
                <p class="heading">Город отправки</p>
                <div class="city-sending" id="city-sending">
                    <div class="find-city">
                        <span class="green-ring"></span>
                        <p class="city-heading" id="change-city"></p>
                    </div>
                    <img src="/assets/icons/Vector.svg" alt="" />
                    <div class="city-dropdown" id="initiator-city-dropdown">
                        <div class="list-dropdown" id="list-dropdown">
                        </div>
                    </div>
                </div>
                <div class="city-list">
                    <a href="" class="color-city-list">Санкт Петербург</a>
                    <a href="" class="color-city-list">Новосибирск</a>
                    <a href="" class="color-city-list">Томск</a>
                </div>
            </div>
            <div>
                <p class="heading">Город назначения</p>
                <div class="city-sending" id="target-city-sending">
                    <div class="find-city">
                        <span class="black-ring"></span>
                        <p class="city-heading" id="target-change-city"></p>
                    </div>
                    <img src="/assets/icons/Vector.svg" alt="" />
                    <div class="city-dropdown" id="target-city-dropdown">
                        <div class="list-dropdown" id="target-list-dropdown">
                        </div>
                    </div>
                </div>
                <div class="city-list">
                    <a href="" class="color-city-list">Новосибирск</a>
                    <a href="" class="color-city-list">Томск</a>
                    <a href="" class="color-city-list">Москва</a>
                </div>
            </div>
            <p class="heading">Размер посылки</p>
            <div class="size-selector">
                <div class="city-sending" id="size-selector">
                    <div class="find-city">
                        <p class="city-heading">Конверт</p>
                    </div>
                    <img src="/assets/icons/Vector.svg" alt="" />
                </div>
                <div class="size-window">
                    <div class="tabs">
                        <div class="tab active" id="approx-tab">
                            <p>Примерные</p>
                        </div>
                        <div class="tab" id="exact-tab">
                            <p>Точные</p>
                        </div>
                    </div>
                    <div class="exact-size">
                        <div class="lenght-size-boxes">
                            <p>Длина</p>
                            <input type="text" placeholder="См" class="wrapper-box-size">
                        </div>
                        <div class="size-boxes">
                            <p>Ширина</p>
                            <input type="text" placeholder="См" class="wrapper-box-size">
                        </div>
                        <div class="size-boxes">
                            <p>Высота</p>
                            <input type="text" placeholder="См" class="wrapper-box-size">
                        </div>
                        <div class="size-boxes">
                            <p>Вес</p>
                            <input type="text" placeholder="См" class="wrapper-box-size">
                        </div>
                    </div>
                    <div class="selection-container" id="box-selection">
                        <div class="size-variants-list">
                            <div class="size-variant" id="size-variant">
                                <img src="/assets/icons/Cards.svg" alt="">
                            </div>
                            <div class="point"></div>
                        </div>
                        <div class="size-variants-list" id="size-variant-list">
                            <div class="size-variant">
                                <img src="/assets/icons/Box_xs.svg" alt="">
                            </div>
                            <div class="point"></div>
                        </div>
                        <div class="size-variants-list">
                            <div class="size-variant">
                                <img src="/assets/icons/box_s.svg" alt="">
                            </div>
                            <div class="point"></div>
                        </div>
                        <div class="size-variants-list">
                            <div class="size-variant">
                                <img src="/assets/icons/box_m.svg" alt="">
                            </div>
                            <div class="point"></div>
                        </div>
                        <div class="size-variants-list">
                            <div class="size-variant">
                                <img src="/assets/icons/box_l.svg" alt="">
                            </div>
                            <div class="point"></div>
                        </div>
                        <div class="size-variants-list">
                            <div class="size-variant">
                                <img src="/assets/icons/box_xl.svg" alt="">
                            </div>
                            <div class="point"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="vector-wrapper" id="calc-button">
                <p class="heading">Расчитать</p>
            </div>
        </div>
        <img src="/assets/icons/ecb2bdc9-85c4-4e0f-b64b-e933a6452d94@2x 1.png" alt="" class="image-delivery" />
        <div class="delivery-promotions">
            <div class="promotion-text">
                <p>Бесплатная доставка</p>
                <p class="promotion-text-label">за приведенного друга</p>
            </div>
            <div class="handshake">
                <img src="/assets/icons/handshake.svg" alt="">
            </div>
        </div>
        <div class="wrapper-order">
            <p class="text-size-list">Отследить посылку</p>
            <div class="find-order-wrapper">
                <input type="text" name="" id="" placeholder="Номер заказа" class="find-order">
                <button class="button-order-find">Найти</button>
            </div>
        </div>
    </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
