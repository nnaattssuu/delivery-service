<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>step2</title>
    <link rel="stylesheet" href="/src/pages/create-oreder/styles.css">
    <link rel="stylesheet" href="/src/shared/normalize.css">
</head>
<body>
    <div class="header">
        <div class="delivery">
            <img src="/assets/icons/box.png" alt="" />
            <p>Delivery</p>
        </div>
        <div class="header-icon">
            <div class="two-icon">
                <img src="/assets/icons/arrow.svg" alt="" />
                <img src="/assets/icons/profile.svg" alt="" />
            </div>
            <div class="sign-out">
                <button type="submit" class="btn-sign-out">Выйти</button>
                <img src="/assets/icons/sign-out.png" alt="" />
            </div>
        </div>
    </div>
     <div class="outer-wrapper">
        <div class="inner-wrapper">
            <div class=" type-delivery">
                <img src="/assets/icons/house.svg" alt="">
                <img src="/assets/icons/vector-right.svg" alt="">
                <p class="font-headline-delivery">Тип доставки</p>
                <img src="/assets//icons//vector-right.svg" alt="">
                <p>Получатель</p>
            </div>
            <p class="font-delivery">Получатель</p>
            <p class=" font-progress">Шаг 2 из 7</p>
            <div class="succes">
                <div class="succes-delivery" style="width: 25%;"></div>
            </div>
            <div class="data-wrapper">
                <div class="input-wrapper">
                    <p>Фамилия</p>
                    <input type="text" placeholder="Иванов" class="data-input">
                </div>
            </div>
            <div class="data-wrapper">
                <div class="input-wrapper">
                    <p>Имя</p>
                    <input type="text" placeholder="Иван" class="data-input">
                </div>
            </div>
            <div class="data-wrapper">
                <div class="input-wrapper">
                    <p>Отчество</p>
                    <input type="text" placeholder="Иванович" class="data-input">
                </div>
            </div>
            <div class="data-wrapper">
                <div class="input-wrapper">
                    <p>Телефон</p>
                    <input type="text" placeholder="+7" class="data-input">
                </div>
            </div>
            <div class="button-actions">
                    <button class="button-back">Назад</button>
                    <button class="button-continue">Продолжить</button>
            </div>
        </div>
        <div class="delivery-wrapper">
                <p class="heading-delivery">Ваш заказ</p>
                <div class="font-wrapper-delivery">
                    <p class="font-type-delivery">Тип доставки</p>
                    <p>Экспресс доставка</p>
                </div>
                <div class="font-wrapper-delivery">
                    <p class="font-type-delivery">Получатель</p>
                    <p>Заполните поля</p>
                </div>
            </div>
            <script src="script2.js"></script>
</body>
</html>
