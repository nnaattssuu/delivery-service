<!DOCTYPE html>

<head>

<body>

            <img src="/assets/icons/box.png" alt="" />

        </div>
        <div class="header-icon">
            <div class="two-icon">
                <img src="/assets/icons/arrow.svg" alt="" />
                <img src="/assets/icons/profile.svg" alt="" />
            </div>
            <div class="sign-out">
                <button type="submit" class="btn-sign_out">Выйти</button>
                <img src="/assets/icons/sign-out.png" alt="" />
            </div>
        </div>
    </div>
     <div class="outer-wrapper">
        <div class="inner-wrapper">
            <div class=" type-delivery">

                <img src="/assets//icons//vector-right.svg" alt="">
                <p class="font-headline_delivery">Получатель</p>
                <img src="/assets//icons//vector-right.svg" alt="">

            <p class="font-delivery">Отправитель</p>
            <p class=" font-progress">Шаг 3 из 7</p>
            <div class="succes">

            </div>
            <div class="data-wrapper">

                </div>
            </div>
            <div class="data-wrapper">

                    <p>Имя</p>
                    <input type="text" placeholder="Иван" class="data-input">
                </div>
            </div>
            <div class="data-wrapper">
                <div class="input-wrapper">
                    <p>Отчество</p>
                    <input type="text" placeholder="Иванович" class="data-input">
                </div>
            </div>
            <div class="data-wrapper">
                <div class="input-wrapper">
                    <p>Телефон</p>
                    <input type="text" placeholder="+7 999 123 45 67" class="data-input">
                </div>
            </div>
            <div class="button-actions">
                    <button class="button-back">Назад</button>
                    <button class="button-continue">Продолжить</button>
            </div>
        </div>
        <div class="delivery-wrapper">
                <p class="heading-delivery">Ваш заказ</p>
                <div class="font-wrapper_delivery">
                    <p class="font-type_delivery">Тип доставки</p>
                    <p>Экспресс доставка</p>
                </div>
                <div class="font-wrapper_delivery">
                    <p class="font-type_delivery">Получатель</p>
                    <p>Климов Алексей Алексеевич, +7 999 999 99 99</p>
                </div>
                <div class="font-wrapper_delivery">
                    <p class="font-type_delivery">Отправитель</p>
                    <p>Иванов Иван Иванович, +7 999 123 45 67</p>
                </div>
            </div>
            <script src="step3.js"></script>
