<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="step1.css">
    <link rel="stylesheet" href="normalize.css">
    <title>Delivery | Шаг 1</title>
</head>

<body>
    <div class="header">
        <div class="logotype">
            <img src="/assets/icons/box.png" alt="" />
            <p>Delivery</p>
        </div>
        <div class="header-actions">
                <img src="/assets/icons/arrow.svg" alt="" />
                <img src="/assets/icons/profile.svg" alt="" />
            <div class="sign-out">
                <button type="submit" class="button-sign-out">Выйти</button>
                <img src="/assets/icons/icon-sign-out.svg" alt="" />
            </div>
        </div>
    </div>
    <div class="outer-wrapper">
        <div class="inner-wrapper">

            <div class=" type-delivery">
                <img src="/assets/icons/house.svg" alt="">
                <img src="/assets/icons/vector-right.svg" alt="">
                <p>Тип доставки</p>
            </div>
            <p class="page-title">Тип доставки</p>
            <p class=" step-title">Шаг 1 из 7</p>
            <div class="succes">
                <div class="succes-delivery"></div>
            </div>
            <div class="express-delivery-card">
                <div class="delivery-card">
                    <div class="list-wrapper">
                        <div class="plane-circle">
                            <img src="/assets/icons/plane.svg" alt="">
                        </div>
                        <div>
                            <p class="delivery-option">Экспресс-доставка до двери</p>
                            <p class="heading-text">780 ₽</p>
                            <p class="delivery-option active">1 рабочий день</p>
                        </div>
                    </div>
                    <img src="/assets/icons/vector-right.svg" alt="" class="vector-right">
                </div>
            </div>
            <div class="defoult-delivery-card">
                <div class="express">
                    <div class="list-wrapper">
                        <div class="plane-circle">
                            <img src="/assets/icons/bus-front.svg" alt="">
                        </div>
                        <div>
                            <p class="delivery-option">Обычная доставка</p>
                            <p class="heading-text">325 ₽</p>
                            <p class="delivery-option active">5 рабочих деней</p>
                        </div>
                    </div>
                    <img src="/assets/icons/vector-right.svg" alt="" class="vector-right">
                </div>
            </div>
            <div class="delivery-promotion-card">
                <div class="promotion-text">
                    <p>1+1=3</p>
                    <p class="promotion-text-label">3-я доставка в подарок</p>
                </div>
                <div class="boxs">
                    <img src="/assets/icons/box1.svg" alt="" class="box-one">
                    <img src="/assets/icons/box2.svg" alt="" class="box-two">
                    <img src="/assets/icons/box3.svg" alt="" class="box-three">
                </div>
            </div>
        </div>
    </div>
</body>

</html>
