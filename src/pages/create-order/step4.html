<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery | Шаг 4</title>
    <link rel="stylesheet" href="/src/pages/create-order/styles.css">
    <link rel="stylesheet" href="/src/shared/normalize.css">
</head>
<body>
    <div class="header">
        <div class="logotype">
            <img src="/assets/icons/box.png" alt="" />
            <p>Delivery</p>
        </div>
        <div class="header-actions">
                <img src="/assets/icons/arrow.svg" alt="" />
                <img src="/assets/icons/profile.svg" alt="" />
            <div class="sign-out">
                <button type="submit" class="button-sign-out">Выйти</button>
                <img src="/assets/icons/icon-sign-out.svg" alt="" />
            </div>
        </div>
    </div>
     <div class="outer-wrapper">
        <div class="inner-wrapper">
            <div class=" type-delivery">
                <img src="/assets/icons/house.svg" alt="">
                <img src="/assets/icons/vector-right.svg" alt="">
                <p class="font-headline-delivery">Тип доставки</p>
                <img src="/assets//icons//vector-right.svg" alt="">
                <p class="font-headline-delivery">Получатель</p>
                <img src="/assets//icons//vector-right.svg" alt="">
                <p class="font-headline-delivery">Отправитель</p>
                <img src="/assets//icons//vector-right.svg" alt="">
                <p>Откуда забрать</p>
            </div>
            <p class="page-title">Откуда забрать</p>
            <p class=" step-title">Шаг 4 из 7</p>
            <div class="succes">
                <div class="succes-delivery" style="width: 60%;"></div>
            </div>
            <div class="data-wrapper">
                <div class="input-wrapper">
                    <p>Улица</p>
                    <input type="text" class="data-input" id="street">
                </div>
            </div>
            <div class="data-wrapper">
                <div class="input-wrapper">
                    <p>Дом</p>
                    <input type="text" class="data-input" id="house">
                </div>
            </div>
            <div class="data-wrapper">
                <div class="input-wrapper">
                    <p>Квартира</p>
                    <input type="text" class="data-input" id="apartment">
                </div>
            </div>
            <div class="data-wrapper">
                <div class="input-wrapper">
                    <p>Заметка для курьера</p>
                    <input type="text" class="data-input" id="comment">
                </div>
            </div>
            <div class="button-actions active">
                    <button class="action-button active">Назад</button>
                    <button class="action-button" id="button-continue">Продолжить</button>
            </div>
        </div>
        <div class="delivery-wrapper">
                <p class="heading-text">Ваш заказ</p>
                <div class="delivery-info">
                </div>
                <div class="delivery-info">
                </div>
                <div class="delivery-info">
                </div>
                <div class="delivery-info">
                    <p class="delivery-info-label">Откуда забрать</p>
                    <p>Заполните поля</p>
                </div>
            </div>
            <script src="step4.js"></script>
</body>
</html>
